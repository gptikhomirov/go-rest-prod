services:
  go-rest-prod-postgres:
    image: postgres:18.1-bookworm
    container_name: go-rest-prod_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  go-rest-prod-migrate:
    image: migrate/migrate:v4.19.1
    container_name: go-rest-prod_migrate
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: go-rest-prod_port-forwarder
    command:
      - TCP-LISTEN:5432,fork,reuseaddr
      - TCP-CONNECT:go-rest-prod-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"